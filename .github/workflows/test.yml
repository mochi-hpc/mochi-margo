name: Unit tests

on:
  workflow_dispatch: {}
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup spack
      uses: spack/setup-spack@v3
      with:
        spack_ref: develop

    - name: Set install root for Spack
      run: |
        spack -e tests config add config:install_tree:root:/opt/spack
        spack -e tests config add view:/opt/view

    - name: Install spack environment
      run: |
        spack -e tests install

    - name: Show spack-installed packages for debugging
      run: |
        spack -e tests find -dlv

    - name: Build code and run unit tests
      run: |
        eval `spack env activate --sh tests`
        mkdir build
        cd build
        cmake .. -DENABLE_TESTS=ON -DENABLE_EXAMPLES=ON
        make
        make test
        make clean
        cd ..
        rm -rf build

    - name: Rebuild code and run unit tests with ASAN
      run: |
        eval `spack env activate --sh tests`
        mkdir build
        cd build
        cmake .. -DENABLE_TESTS=ON -DENABLE_ASAN=ON
        make
        # detect_stack_use_after_return is enabled by default on GCC >= 12.
        # Its fake-stack is thread-local and incompatible with Argobots
        # migrating a ULT across execution streams (e.g. margo-migrate-progress),
        # since Argobots is not built with __sanitizer_*_switch_fiber annotations.
        # Disable it so the suite passes regardless of the runner's toolchain.
        ASAN_OPTIONS="abort_on_error=1:detect_stack_use_after_return=0" make test

    - name: Show test output
      if: always()
      run: |
        cat build/Testing/Temporary/LastTest.log
